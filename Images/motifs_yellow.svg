<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300">
    <!-- Roue de vélo (Jaune) -->
    <g transform="translate(50, 50) scale(1.2)">
        <circle cx="50" cy="50" r="45" fill="none" stroke="#FFD200" stroke-width="12"/>
        <line x1="50" y1="5" x2="50" y2="95" stroke="#FFD200" stroke-width="6"/>
        <line x1="5" y1="50" x2="95" y2="50" stroke="#FFD200" stroke-width="6"/>
        <line x1="18" y1="18" x2="82" y2="82" stroke="#FFD200" stroke-width="6"/>
        <line x1="18" y1="82" x2="82" y2="18" stroke="#FFD200" stroke-width="6"/>
        <circle cx="50" cy="50" r="12" fill="#FFD200"/>
    </g>

    <!-- Bandes verticales (Jaune) -->
    <g transform="translate(250, 30)">
        <rect x="0" y="0" width="20" height="100" fill="#FFD200"/>
        <rect x="30" y="0" width="20" height="100" fill="#FFD200"/>
        <rect x="60" y="0" width="20" height="100" fill="#FFD200"/>
    </g>

    <!-- Motif triangle asymétrique (Jaune) -->
    <g transform="translate(420, 50)">
        <polygon points="0,0 80,40 0,80" fill="#FFD200"/>
    </g>
    
    <!-- Triangle inversé Jaune -->
    <g transform="translate(520, 50)">
        <polygon points="80,0 0,80 80,80" fill="#FFD200"/>
    </g>

    <!-- Ballon de Basket (Jaune) -->
    <g transform="translate(700, 50) scale(1.1)">
        <circle cx="45" cy="45" r="40" fill="none" stroke="#FFD200" stroke-width="8"/>
        <line x1="45" y1="5" x2="45" y2="85" stroke="#FFD200" stroke-width="6"/>
        <line x1="5" y1="45" x2="85" y2="45" stroke="#FFD200" stroke-width="6"/>
        <path d="M 15 15 Q 45 45 15 75" fill="none" stroke="#FFD200" stroke-width="6"/>
        <path d="M 75 15 Q 45 45 75 75" fill="none" stroke="#FFD200" stroke-width="6"/>
    </g>

    <!-- Curseur (Jaune) -->
    <g transform="translate(880, 60) scale(1.8)">
        <path d="M 0,0 L 0,40 L 12,28 L 22,46 L 30,42 L 18,24 L 32,24 Z" fill="none" stroke="#FFD200" stroke-width="4" stroke-linejoin="round"/>
        <path d="M 0,0 L 0,40 L 12,28 L 22,46 L 30,42 L 18,24 L 32,24 Z" fill="#FFD200"/>
    </g>

    <!-- Losanges (Jaune) -->
    <g transform="translate(80, 180) scale(1.2)" fill="#FFD200">
        <polygon points="20,0 40,30 20,60 0,30"/>
        <polygon points="50,0 70,30 50,60 30,30"/>
        <polygon points="80,0 100,30 80,60 60,30"/>
    </g>

    <!-- Maillot sportif (Jaune) -->
    <g transform="translate(280, 180) scale(1.1)">
        <path d="M 20,0 L 50,0 L 60,15 L 85,15 L 85,35 L 70,35 L 70,80 L 0,80 L 0,35 L -15,35 L -15,15 L 10,15 Z" fill="none" stroke="#FFD200" stroke-width="8" stroke-linejoin="round"/>
        <line x1="35" y1="0" x2="35" y2="30" stroke="#FFD200" stroke-width="6"/>
    </g>

    <!-- Bandes Diagonales (Jaune) -->
    <g transform="translate(500, 190) scale(1.2)">
        <polygon points="0,60 60,0 80,0 20,60" fill="#FFD200"/>
        <polygon points="30,60 90,0 110,0 50,60" fill="#FFD200"/>
    </g>

    <!-- Motif Carré croisé (Jaune) -->
    <g transform="translate(720, 180) scale(1.1)" stroke="#FFD200" stroke-width="8" fill="none">
        <rect x="0" y="0" width="70" height="70"/>
        <line x1="35" y1="0" x2="35" y2="70"/>
        <line x1="0" y1="35" x2="70" y2="35"/>
        <circle cx="35" cy="35" r="8" fill="#FFD200" stroke="none"/>
    </g>

    <!-- Triangles superposés (Jaune) -->
    <g transform="translate(880, 180)" fill="#FFD200">
        <polygon points="0,0 20,40 40,0"/>
        <polygon points="30,0 50,40 70,0"/>
        <polygon points="0,40 20,80 40,40"/>
        <polygon points="30,40 50,80 70,40"/>
    </g>

</svg>
