<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="100%" height="600">
    <!-- Formes géométriques solides In-Yellow (Jaune) éparpillées -->
    <!-- Opacité déjà gérée par le fond CSS ou les groupes -->

    <!-- ================= GAUCHE ================= -->
    <!-- Roue de vélo (Grand) -->
    <g transform="translate(180, 80) scale(2.2)" fill="none" stroke="#FFD200" stroke-width="10">
        <circle cx="50" cy="50" r="45"/>
        <line x1="50" y1="5" x2="50" y2="95"/>
        <line x1="5" y1="50" x2="95" y2="50"/>
        <line x1="18" y1="18" x2="82" y2="82"/>
        <line x1="18" y1="82" x2="82" y2="18"/>
        <circle cx="50" cy="50" r="12" fill="#FFD200" stroke="none"/>
    </g>

    <!-- Bandes verticales -->
    <g transform="translate(420, 380) scale(1.4)">
        <rect x="0" y="0" width="20" height="90" fill="#FFD200"/>
        <rect x="30" y="0" width="20" height="90" fill="#FFD200"/>
        <rect x="60" y="0" width="20" height="90" fill="#FFD200"/>
    </g>

    <!-- Losanges -->
    <g transform="translate(200, 420) scale(1.6)" fill="#FFD200">
        <polygon points="20,0 40,30 20,60 0,30"/>
        <polygon points="50,0 70,30 50,60 30,30"/>
    </g>

    <!-- Motif Carré croisé -->
    <g transform="translate(100, 260) scale(1.2)" stroke="#FFD200" stroke-width="8" fill="none">
        <rect x="0" y="0" width="60" height="60"/>
        <line x1="30" y1="0" x2="30" y2="60"/>
        <line x1="0" y1="30" x2="60" y2="30"/>
        <circle cx="30" cy="30" r="8" fill="#FFD200" stroke="none"/>
    </g>


    <!-- ================= DROITE ================= -->
    <!-- Ballon de Basket -->
    <g transform="translate(1500, 100) scale(2)">
        <circle cx="45" cy="45" r="40" fill="none" stroke="#FFD200" stroke-width="8"/>
        <line x1="45" y1="5" x2="45" y2="85" stroke="#FFD200" stroke-width="6"/>
        <line x1="5" y1="45" x2="85" y2="45" stroke="#FFD200" stroke-width="6"/>
        <path d="M 15 15 Q 45 45 15 75" fill="none" stroke="#FFD200" stroke-width="6"/>
        <path d="M 75 15 Q 45 45 75 75" fill="none" stroke="#FFD200" stroke-width="6"/>
    </g>

    <!-- Curseur informatique (Grand) -->
    <g transform="translate(1350, 400) scale(2.8)">
        <path d="M 0,0 L 0,40 L 12,28 L 22,46 L 30,42 L 18,24 L 32,24 Z" fill="none" stroke="#FFD200" stroke-width="2" stroke-linejoin="round"/>
        <path d="M 0,0 L 0,40 L 12,28 L 22,46 L 30,42 L 18,24 L 32,24 Z" fill="#FFD200"/>
    </g>

    <!-- Maillot de cyclisme -->
    <g transform="translate(1650, 360) scale(1.5)">
        <path d="M 20,0 L 50,0 L 60,15 L 85,15 L 85,35 L 70,35 L 70,80 L 0,80 L 0,35 L -15,35 L -15,15 L 10,15 Z" fill="none" stroke="#FFD200" stroke-width="8" stroke-linejoin="round"/>
        <line x1="35" y1="0" x2="35" y2="30" stroke="#FFD200" stroke-width="6"/>
    </g>

    <!-- Triangles superposés -->
    <g transform="translate(1750, 200) scale(1.2)" fill="#FFD200">
        <polygon points="0,0 20,40 40,0"/>
        <polygon points="30,0 50,40 70,0"/>
    </g>


    <!-- ================= CENTRE (assez transparent pour ne pas cacher le texte) ================= -->
    <!-- Triangle asymétrique -->
    <g transform="translate(1150, 60)" opacity="0.6">
        <polygon points="0,0 80,40 0,80" fill="#FFD200"/>
    </g>

    <g transform="translate(800, 520)" opacity="0.6">
        <polygon points="80,0 0,80 80,80" fill="#FFD200"/>
    </g>

</svg>
